<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Subway GLB</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>
</head>

<body>
<canvas id="gameCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/loaders/GLTFLoader.js';

const CONFIG = {
    LANE_POSITIONS: [-3, 0, 3]
};

const PLAYERS = [
    { name:"Tonini", image:"tonini.png" },
    { name:"Werner", image:"werner.png" },
    { name:"Trocha", image:"trocha.png" },
    { name:"Dingo", image:"dingo.png" },
    { name:"Cebão", image:"brubru.png" },
    { name:"Beraldo", image:"caioba.png" },
    { name:"Gugu", image:"gugu.png" }
];

let scene, camera, renderer, clock;
let player;

init();
animate();

function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
    camera.position.set(0,5,10);

    renderer = new THREE.WebGLRenderer({canvas:gameCanvas, antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    clock = new THREE.Clock();

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    // chão simples
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(50,200),
        new THREE.MeshStandardMaterial({color:0x333333})
    );
    ground.rotation.x = -Math.PI/2;
    ground.position.z = -80;
    scene.add(ground);

    player = new Player(scene);
    player.loadModel();

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft') player.moveLeft();
        if (e.code === 'ArrowRight') player.moveRight();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

class Player {

    constructor(scene){
        this.scene = scene;
        this.mesh = null;
        this.mixer = null;
        this.actions = {};

        this.currentLane = 1;
        this.targetX = 0;
    }

    loadModel(){

        const loader = new GLTFLoader();

        loader.load('models/runner.glb', (gltf)=>{

            this.mesh = gltf.scene;
            this.mesh.scale.set(1.5,1.5,1.5);
            this.mesh.position.set(0,0,0);

            this.scene.add(this.mesh);

            // animação
            this.mixer = new THREE.AnimationMixer(this.mesh);
            gltf.animations.forEach(clip=>{
                this.actions[clip.name] = this.mixer.clipAction(clip);
            });

            if (this.actions['Run']) {
                this.actions['Run'].play();
            } else {
                console.log("Animações disponíveis:", Object.keys(this.actions));
            }

            // aplica rosto inicial
            this.applyFace(PLAYERS[0].image);

        });
    }

    applyFace(imageName){

        const texture = new THREE.TextureLoader().load(`faces/${imageName}`);
        texture.flipY = false;
        texture.encoding = THREE.sRGBEncoding;

        this.mesh.traverse(child=>{
            if(child.isMesh){

                console.log("Mesh:", child.name);

                const name = child.name.toLowerCase();

                if(
                    name.includes('head') ||
                    name.includes('face') ||
                    name.includes('neck')
                ){
                    child.material = new THREE.MeshStandardMaterial({
                        map: texture,
                        roughness:0.5,
                        metalness:0
                    });
                }
            }
        });
    }

    update(dt){
        if(!this.mesh) return;

        const diff = this.targetX - this.mesh.position.x;
        this.mesh.position.x += diff * 10 * dt;

        if(this.mixer) this.mixer.update(dt);
    }

    moveLeft(){
        if(this.currentLane>0){
            this.currentLane--;
            this.targetX = CONFIG.LANE_POSITIONS[this.currentLane];
        }
    }

    moveRight(){
        if(this.currentLane<2){
            this.currentLane++;
            this.targetX = CONFIG.LANE_POSITIONS[this.currentLane];
        }
    }
}

function animate(){
    requestAnimationFrame(animate);

    const dt = clock.getDelta();

    if(player) player.update(dt);

    renderer.render(scene, camera);
}

</script>
</body>
</html>
